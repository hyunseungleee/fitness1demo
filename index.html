<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gym Pro Tracker</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --primary: #d0fd3e; /* 스포티한 형광 연두색 */
            --secondary: #3a3a3c;
            --text: #ffffff;
            --input-bg: #2c2c2e;
            --danger: #ff453a;
            --border-radius: 14px;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; 
            /* 아이폰 노치 및 하단 바 영역 대응 */
            padding: calc(env(safe-area-inset-top) + 10px) 15px calc(env(safe-area-inset-bottom) + 20px) 15px;
            -webkit-tap-highlight-color: transparent;
            word-break: keep-all;
        }

        .container { width: 100%; max-width: 500px; margin: 0 auto; }
        
        h1 { font-size: 26px; font-weight: 800; margin: 15px 0 25px 0; color: var(--primary); letter-spacing: -1.5px; text-align: center; }

        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 22px; 
            margin-bottom: 15px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        h3 { margin: 0 0 18px 0; font-size: 15px; font-weight: 700; color: #8e8e93; letter-spacing: -0.5px; text-transform: uppercase; }

        /* 🔥 핵심 수정 부분: 모든 입력창 스타일 통일 및 iOS date 버그 해결 */
        input, select { 
            background: var(--input-bg); 
            border: 1px solid #3a3a3c; 
            color: white; 
            padding: 15px; 
            border-radius: var(--border-radius); 
            font-size: 16px; /* iOS 자동 줌 방지 */
            width: 100%;
            box-sizing: border-box; /* 패딩을 너비에 포함 */
            margin-bottom: 10px;
            transition: border-color 0.2s;
            
            /* iOS 기본 스타일 초기화 (날짜 박스 튀어나옴 방지) */
            -webkit-appearance: none; 
            appearance: none;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* 날짜 입력창 전용 스타일 (아이콘 색상 등) */
        input[type="date"] {
            position: relative;
            color-scheme: dark; /* iOS 달력 팝업을 다크 모드로 설정 */
        }
        
        /* select 창의 화살표 아이콘 커스텀 (iOS appearance none 대응) */
        select {
            background-image: url("data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/1999/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%238e8e93' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 18px;
            padding-right: 45px;
        }

        .set-row { 
            display: grid; 
            grid-template-columns: 35px 1fr 1fr 45px; 
            gap: 10px; 
            align-items: center; 
            margin-bottom: 12px; 
        }

        .set-num { color: var(--primary); font-weight: 800; text-align: center; font-size: 16px; }

        button { 
            border: none; 
            border-radius: var(--border-radius); 
            font-weight: 700; 
            font-size: 16px;
            cursor: pointer; 
            transition: all 0.2s;
            box-sizing: border-box;
        }

        button:active { transform: scale(0.97); opacity: 0.8; }

        /* 머신 등록 섹션 스타일 조정 */
        .machine-reg-group { display: flex; gap: 10px; margin-bottom: 0; }
        .machine-reg-group input { margin-bottom: 0; flex: 1; }
        .btn-reg { background: var(--primary); color: black; padding: 0 20px; height: 50px; }

        .btn-add-set { background: rgba(255,255,255,0.05); color: #aeaeb2; width: 100%; padding: 14px; margin-top: 5px; border: 1px dashed #444; }
        .btn-add-set:hover { background: rgba(255,255,255,0.1); color: white; border-color: #666; }
        
        .btn-save { background: var(--primary); color: black; width: 100%; padding: 18px; margin-top: 25px; font-size: 18px; font-weight: 800; box-shadow: 0 5px 15px rgba(208, 253, 62, 0.3); }
        .btn-del { background: transparent; color: var(--danger); font-size: 22px; padding: 0; }

        .chart-container { height: 280px; width: 100%; margin-top: 15px; }

        .history-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 0; border-bottom: 1px solid #2c2c2e; 
        }
        .history-info strong { display: block; font-size: 16px; margin-bottom: 3px; }
        .history-info span { font-size: 13px; color: #8e8e93; font-weight: 500; }
        .btn-item-del { background: rgba(255,69,58,0.1); color: var(--danger); padding: 8px 12px; font-size: 12px; border-radius: 8px; }
        
        /* 스크롤바 커스텀 */
        #historyList { max-height: 350px; overflow-y: auto; padding-right: 5px; }
        #historyList::-webkit-scrollbar { width: 5px; }
        #historyList::-webkit-scrollbar-thumb { background: #444; border-radius: 5px; }

    </style>
</head>
<body>

<div class="container">
    <h1>GYM LOG PRO</h1>
    
    <section class="card">
        <h3>MACHINE REGISTRY</h3>
        <div class="machine-reg-group">
            <input type="text" id="machineName" placeholder="새 머신 이름 (예: 벤치프레스)">
            <button class="btn-reg" onclick="registerMachine()">추가</button>
        </div>
    </section>

    <section class="card">
        <h3>WORKOUT INPUT</h3>
        
        <input type="date" id="workoutDate">
        
        <select id="machineSelect" onchange="refreshView()">
            <option value="">머신 선택</option>
        </select>
        
        <div id="setContainer"></div>
        <button class="btn-add-set" onclick="addSetRow()">+ SET ADD</button>
        <button class="btn-save" onclick="saveWorkout()">SAVE WORKOUT</button>
    </section>

    <section class="card">
        <h3>PROGRESS CHART</h3>
        <div class="chart-container">
            <canvas id="progressChart"></canvas>
        </div>
    </section>

    <section class="card">
        <h3>HISTORY</h3>
        <div id="historyList"></div>
    </section>
</div>

<script>
    // 로컬 스토리지 키 값 변경으로 데이터 독립성 확보
    let db = JSON.parse(localStorage.getItem('GymAppDB_FinalV1')) || { machines: [], logs: [] };
    let myChart = null;
    let setCount = 0;

    function init() {
        document.getElementById('workoutDate').value = new Date().toISOString().split('T')[0];
        const select = document.getElementById('machineSelect');
        const currentVal = select.value;
        select.innerHTML = '<option value="">머신 선택</option>';
        db.machines.sort().forEach(m => {
            const opt = document.createElement('option');
            opt.value = m; opt.innerText = m;
            select.appendChild(opt);
        });
        select.value = currentVal;
        if (document.querySelectorAll('.set-row').length === 0) addSetRow();
        updateChart();
    }

    function addSetRow() {
        setCount++;
        const container = document.getElementById('setContainer');
        const row = document.createElement('div');
        row.className = 'set-row';
        row.id = `set-row-${setCount}`;
        row.innerHTML = `
            <div class="set-num">${setCount}</div>
            <input type="number" class="w-in" placeholder="kg" inputmode="decimal">
            <input type="number" class="r-in" placeholder="reps" inputmode="numeric">
            <button class="btn-del" onclick="removeSetRow(${setCount})">×</button>
        `;
        container.appendChild(row);
    }

    function removeSetRow(id) {
        if (document.querySelectorAll('.set-row').length > 1) {
            document.getElementById(`set-row-${id}`).remove();
        }
    }

    function registerMachine() {
        const input = document.getElementById('machineName');
        const name = input.value.trim();
        if (name && !db.machines.includes(name)) {
            db.machines.push(name);
            saveData();
            init();
            input.value = '';
        } else if (name) {
            alert("이미 등록된 머신입니다.");
        }
    }

    function saveWorkout() {
        const machine = document.getElementById('machineSelect').value;
        const date = document.getElementById('workoutDate').value;
        if (!machine || !date) return alert("머신과 날짜를 선택하세요.");

        const ws = document.querySelectorAll('.w-in');
        const rs = document.querySelectorAll('.r-in');
        let max1RM = 0, totalV = 0, valid = false;

        ws.forEach((wIn, i) => {
            const w = parseFloat(wIn.value), r = parseInt(rs[i].value);
            if (w > 0 && r > 0) {
                const rm = w * (1 + r/30);
                if (rm > max1RM) max1RM = rm;
                totalV += (w * r);
                valid = true;
            }
        });

        if (!valid) return alert("데이터를 입력하세요.");

        db.logs.push({ id: Date.now(), date, machine, rm: max1RM, vol: totalV });
        saveData();
        refreshView();
        document.getElementById('setContainer').innerHTML = '';
        setCount = 0; addSetRow();
        alert("저장 완료!");
    }

    function deleteLog(id) {
        if (confirm("정말 삭제하시겠습니까?")) {
            db.logs = db.logs.filter(l => l.id !== id);
            saveData();
            refreshView();
        }
    }

    function refreshView() { updateChart(); updateHistory(); }

    function updateHistory() {
        const m = document.getElementById('machineSelect').value;
        const list = document.getElementById('historyList');
        const filtered = db.logs.filter(l => l.machine === m).sort((a,b) => new Date(b.date) - new Date(a.date));
        list.innerHTML = filtered.map(l => `
            <div class="history-item">
                <div class="history-info"><strong>${l.date}</strong><span>1RM: ${l.rm.toFixed(1)}kg | Vol: ${l.vol}kg</span></div>
                <button class="btn-item-del" onclick="deleteLog(${l.id})">삭제</button>
            </div>
        `).join('') || '<p style="text-align:center;color:#555;font-size:14px;margin-top:20px;">기록이 없습니다.</p>';
    }

    function updateChart() {
        const m = document.getElementById('machineSelect').value;
        if (!m) {
            if (myChart) myChart.destroy();
            return;
        }
        const daily = {};
        db.logs.filter(l => l.machine === m).forEach(l => {
            if (!daily[l.date]) daily[l.date] = { rm: 0, vol: 0 };
            daily[l.date].rm = Math.max(daily[l.date].rm, l.rm);
            daily[l.date].vol += l.vol;
        });
        const dates = Object.keys(daily).sort();
        const ctx = document.getElementById('progressChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            data: {
                labels: dates,
                datasets: [
                    { type: 'line', label: '1RM', data: dates.map(d => daily[d].rm), borderColor: '#d0fd3e', backgroundColor: '#d0fd3e', tension: 0.3, yAxisID: 'y', pointRadius: 2 },
                    { type: 'bar', label: 'Vol', data: dates.map(d => daily[d].vol), backgroundColor: 'rgba(255,255,255,0.08)', yAxisID: 'y1', borderRadius: 5 }
                ]
            },
            options: { 
                responsive: true, maintainAspectRatio: false,
                scales: { 
                    y: { position: 'left', grid: { color: '#2c2c2e' }, ticks: { color: '#8e8e93', font: { size: 11 } } },
                    y1: { position: 'right', grid: { display: false }, ticks: { color: '#555', font: { size: 10 } } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    function saveData() { localStorage.setItem('GymAppDB_FinalV1', JSON.stringify(db)); }
    init();
</script>
</body>
</html>
